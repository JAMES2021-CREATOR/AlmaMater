<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
     <header class="fixed w-full bg-white/90 backdrop-blur shadow z-50">
      <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
        <h1 class="text-xl font-bold text-blue-600">AlmaMater</h1>

        <nav class="hidden md:flex  font-medium space-x-10 ml-50">
          <a href="./index.html">Home</a>
          <a href="./about.html">About</a>
          <a href="./programes.html">Programs</a>
          <a href="./news.html"> News</a>
          <a href="./gallery.html">Gallery</a>
          <a href="./contact.html">Contact</a>
           <button class="bg-blue-600 text-white px-[15px] py-[8px] rounded-lg">
            <a href="https://wa.me/message/Y36O4OHU4GOWL1">APPLY NOW</a>
          </button>
        </nav>

        <button id="menuBtn" class="md:hidden text-2xl">☰</button>
      </div>

      <div id="mobileMenu" class="hidden px-4 pb-4 md:hidden">
        <a href="./index.html" class="block py-2">Home</a>
        <a href="./about.html" class="block py-2">About</a>
        <a href="./programes.html" class="block py-2">Programs</a>
        <a href="./news.html" class="block py-2"> News</a>
        <a href="./gallery.html" class="block py-2">Gallery</a>
        <a href="./contact.html" class="block py-2">Contact</a>
      </div>
    </header>
    <section class="py-20 px-6 md:px-16 bg-gradient-to-b from-white to-gray-100">
  
  <!-- Header -->
  <div class="text-center mb-12">
    <h2 class="text-4xl font-bold text-gray-800">Contact Us</h2>
    <p class="text-gray-500 mt-3 max-w-2xl mx-auto">
      Have questions or want to visit us? Send a message or use the details below.
    </p>
  </div>

  <!-- Contact Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-12">

    <!-- Left Side: Info & Map -->
    <div class="space-y-6">

      <!-- Address -->
      <div class="flex items-start gap-4">
        <svg class="w-6 h-6 text-blue-600 mt-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13401 2 5 5.13401 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.86599-3.13401-7-7-7zM12 11.5c-1.38071 0-2.5-1.11929-2.5-2.5s1.11929-2.5 2.5-2.5 2.5 1.11929 2.5 2.5-1.11929 2.5-2.5 2.5z"/></svg>
        <p class="text-gray-600">123 School Street, Lagos, Nigeria</p>
      </div>

      <!-- Phone -->
      <div class="flex items-center gap-4">
        <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.21c1.2.48 2.5.74 3.83.74a1 1 0 011 1v3.5a1 1 0 01-1 1C10.4 21 3 13.6 3 5a1 1 0 011-1H7.5a1 1 0 011 1c0 1.33.26 2.63.74 3.83a1 1 0 01-.21 1.11l-2.2 2.2z"/></svg>
        <p class="text-gray-600">+234 801 234 5678</p>
      </div>

      <!-- Email -->
      <div class="flex items-center gap-4">
        <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <p class="text-gray-600">info@schoolname.com</p>
      </div>

      <!-- Map Placeholder -->
      <div class="w-full h-64 rounded-xl overflow-hidden shadow-md mt-6">
        <iframe 
          class="w-full h-full"
          src="https://maps.google.com/maps?q=Lagos&t=&z=13&ie=UTF8&iwloc=&output=embed"
          frameborder="0" 
          allowfullscreen
        ></iframe>
      </div>

    </div>

    <!-- Right Side: Contact Form -->
    <div>
      <form class="bg-white rounded-2xl p-8 shadow-md space-y-6">
        <div>
          <label class="block text-gray-700 font-medium mb-2">Name</label>
          <input type="text" placeholder="Your Name" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600">
        </div>

        <div>
          <label class="block text-gray-700 font-medium mb-2">Email</label>
          <input type="email" placeholder="Your Email" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600">
        </div>

        <div>
          <label class="block text-gray-700 font-medium mb-2">Message</label>
          <textarea placeholder="Your Message" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" rows="5"></textarea>
        </div>

        <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-full hover:bg-blue-700 transition duration-300">
          Send Message
        </button>
      </form>
    </div>

  </div>

</section>
     <script>
      const btn = document.getElementById("menuBtn");
      const menu = document.getElementById("mobileMenu");

      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });
    </script>
</body>
</html>
